<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#12151c"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e8a6a"/>
      <stop offset="50%" stop-color="#5ab5ff"/>
      <stop offset="100%" stop-color="#f29f05"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#0e8a6a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0e8a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#5ab5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5ab5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Logo mark -->
  <g transform="translate(80, 220)">
    <rect width="80" height="80" rx="18" fill="url(#brand)" opacity="0.9"/>
    <path d="M52 22 A20 20 0 1 0 52 58" fill="none" stroke="white" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#f5f7fa">Codeek Apps</text>
  <!-- Tagline -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#9aa3b2">Official developer website for our mobile app portfolio.</text>
  <!-- Accent line -->
  <rect x="80" y="460" width="200" height="4" rx="2" fill="url(#brand)"/>
  <!-- URL -->
  <text x="80" y="540" font-family="ui-monospace, monospace" font-size="22" fill="#9aa3b2" opacity="0.7">codeek-ai.github.io</text>
</svg>
